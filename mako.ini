# Devvychrome — Mako notification styling.
#
# Layered on top of Omarchy's default mako rules (timeouts, do-not-
# disturb mode, Spotify suppression, the app-button rules for
# Setup/Update/Keybindings, etc). Only the chassis dimensions, the
# colour palette, and urgency luminance tiers are overridden here —
# everything else is inherited so omarchy update behaviour stays
# intact.

include=~/.local/share/omarchy/default/mako/core.ini

# ── Outer chassis ────────────────────────────────────────────────
# Compact card on a matte dark surface with a subtle, restrained
# border. Narrower than the 420px stock width so the card reads as
# instrumentation, not signage.
background-color=#1d1d1d
border-color=#3a3a3a
text-color=#c8c8c8
border-size=1
border-radius=2
width=340
padding=8,12
outer-margin=12

# Title brighter than body via a pango span; body inherits text-color
# (#c8c8c8). Keeping body at #c8c8c8 and lifting only the title to
# #e0e0e0 maintains the Devvychrome luminance hierarchy.
markup=1
format=<span foreground="#e0e0e0"><b>%s</b></span>\n%b

# Progress meter (e.g. file transfers, media volume changes) — a
# luminance-only bar at the body-text band so it never out-shouts
# the title.
progress-color=over #6f6f6f

# ── Urgency tiers — luminance, not hue ───────────────────────────
# All three states share the same chassis. The signal is carried by
# the border step and (for critical) by lifting the title luminance
# one notch.

[urgency=low]
border-color=#2a2a2a
text-color=#9a9a9a
default-timeout=4000

[urgency=normal]
border-color=#3a3a3a
text-color=#c8c8c8
default-timeout=5000

[urgency=critical]
border-color=#7a7a7a
text-color=#e0e0e0
default-timeout=0
format=<span foreground="#ececec"><b>%s</b></span>\n%b
