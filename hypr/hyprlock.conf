# Devvychrome — Hyprlock layout
#
# Replaces ~/.config/hypr/hyprlock.conf to render the full Devvychrome
# lock screen: lower-third time anchor, restrained date caption, subtle
# password field, no blur, no animation, no chrome.
#
# Color variables come from whichever Omarchy theme is currently active
# (sourced below). When the active theme is Devvychrome, the values in
# ./hyprlock.conf at the repo root are used.

source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
    hide_cursor = true
    no_fade_in = true
    no_fade_out = true
}

animations {
    enabled = false
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 0
}

# Status pretext — small uppercase mark above the time.
# Reinforces the "sealed workstation" feel without decorating it.
label {
    monitor =
    text = SEALED
    color = rgba(120, 120, 120, 1.0)
    font_size = 11
    font_family = JetBrainsMono Nerd Font Mono
    halign = center
    valign = bottom
    position = 0, 460
}

# Time — dominant element, anchored in the lower third.
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $font_color
    font_size = 96
    font_family = JetBrainsMono Nerd Font Mono Light
    halign = center
    valign = bottom
    position = 0, 340
}

# Date — quiet caption directly beneath the time.
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%a · %d %b %Y")"
    color = rgba(160, 160, 160, 1.0)
    font_size = 13
    font_family = JetBrainsMono Nerd Font Mono
    halign = center
    valign = bottom
    position = 0, 290
}

# Password field — subtle, single-line outline, no rounding, no shadow.
input-field {
    monitor =
    size = 360, 44
    halign = center
    valign = bottom
    position = 0, 160

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 1

    font_family = JetBrainsMono Nerd Font Mono
    font_color = $font_color

    placeholder_text = <span foreground="##787878">unlock</span>
    check_color = $check_color
    fail_color = rgba(120, 120, 120, 1.0)
    fail_text = <i>$FAIL · $ATTEMPTS</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}
