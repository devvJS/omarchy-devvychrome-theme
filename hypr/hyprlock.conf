# Devvychrome — Hyprlock layout
#
# Replaces ~/.config/hypr/hyprlock.conf to render the Devvychrome lock
# screen: a centered time/date/auth cluster over a blurred monochrome
# wallpaper, pinned to the primary monitor.
#
# Composition rules:
#   - Centered cluster. Time, date, and auth field stack around screen
#     center on the primary monitor.
#   - Blurred wallpaper. blur_passes=3 (matching stock Omarchy) softens
#     the wallpaper into a fog; no shape overlay, no brightness dial.
#   - Industrial field. Opaque dark interior, dim outline, no rounding,
#     no shadow, no fade — just larger than the brutalist v2 cluster.
#
# Color variables come from whichever Omarchy theme is currently active
# (sourced below). Under Devvychrome, the values in ./hyprlock.conf at
# the repo root apply.

source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
    hide_cursor = true
}

animations {
    enabled = false
}

# Wallpaper. blur_passes=3 matches stock Omarchy and softens the
# graphic into a monochrome fog without darkening it.
background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

# Time — dominant readout above screen center.
# Pinned to the primary monitor so secondary displays stay as bare
# blurred backdrops (no mirrored readout).
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $font_color
    font_size = 96
    font_family = JetBrainsMono Nerd Font Mono Light
    halign = center
    valign = center
    position = 0, 160
}

# Date — quiet caption directly beneath the time. Same pin.
label {
    monitor = DP-1
    text = cmd[update:60000] echo "$(date +"%a · %d %b %Y")"
    color = rgba(160, 160, 160, 1.0)
    font_size = 12
    font_family = JetBrainsMono Nerd Font Mono
    halign = center
    valign = center
    position = 0, 90
}

# Auth field — large centered panel. Opaque dark interior, dim 2px
# outline, no rounding. Pinned to the primary monitor only; secondary
# monitors show the blurred wallpaper with no input cluster.
input-field {
    monitor = DP-1
    size = 580, 84
    halign = center
    valign = center
    position = 0, -40

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 2

    font_family = JetBrainsMono Nerd Font Mono
    font_color = $font_color

    placeholder_text = <span foreground="##6a6a6a">enter the void</span>
    check_color = $check_color
    fail_color = rgba(120, 120, 120, 1.0)
    fail_text = <i>try again, peasant.</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}
